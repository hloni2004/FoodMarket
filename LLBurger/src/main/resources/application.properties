# ???????????????????????????????????????????????????????????????????????????????
# APPLICATION
# ???????????????????????????????????????????????????????????????????????????????
spring.application.name=LLBurger

# ???????????????????????????????????????????????????????????????????????????????
# SUPABASE DATABASE (PostgreSQL)
# Use the SESSION POOLER URL from Supabase Dashboard > Settings > Database > Connection Pooling
# Session mode (port 5432) is required for HikariCP - do NOT use Transaction mode (port 6543)
# Session pooler URL format: jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
# ???????????????????????????????????????????????????????????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ??? Connection Pooling (HikariCP) ????????????????????????????????????????????
# Max 50 simultaneous connections as per documentation
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ??? JPA / Hibernate ??????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ???????????????????????????????????????????????????????????????????????????????
# SUPABASE STORAGE (Image Uploads)
# Bucket : llburger-images  ? create this bucket in Supabase (see instructions)
# Subfolders used by the app (created automatically on first upload):
#   products/   ? burger / drink / sauce images
#   sides/      ? side-dish images
#   extras/     ? extra (cheese, bacon, etc.) images
# The key below must be your project's SERVICE ROLE key (not the anon key).
# ???????????????????????????????????????????????????????????????????????????????
supabase.url=https://vlklxrrgvaoykpkvdoxe.supabase.co
supabase.key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=llburger-images

# ???????????????????????????????????????????????????????????????????????????????
# REDIS (Caching Layer)
# Frequently read data: product catalog, stock levels, notifications
# ???????????????????????????????????????????????????????????????????????????????
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=<YOUR_REDIS_PASSWORD>
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ???????????????????????????????????????????????????????????????????????????????
# RABBITMQ (Queue-Based Order & Email Processing)
# Orders and emails are queued and processed asynchronously
# ???????????????????????????????????????????????????????????????????????????????
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ???????????????????????????????????????????????????????????????????????????????
# EMAIL PROVIDER 1: BREVO (Welcome emails + Business notifications)
# ???????????????????????????????????????????????????????????????????????????????
mail.sender1.host=smtp-relay.brevo.com
mail.sender1.port=587
mail.sender1.username=${BREVO_SMTP_USERNAME}
mail.sender1.password=${BREVO_SMTP_PASSWORD}
mail.sender1.from=noreply@llburgers.com
mail.sender1.properties.mail.smtp.auth=true
mail.sender1.properties.mail.smtp.starttls.enable=true

# ???????????????????????????????????????????????????????????????????????????????
# EMAIL PROVIDER 2: MAILJET (Order confirmations + Status updates)
# ???????????????????????????????????????????????????????????????????????????????
spring.mail.host=in-v3.mailjet.com
spring.mail.port=587
spring.mail.username=${MAILJET_API_KEY}
spring.mail.password=${MAILJET_API_SECRET}
spring.mail.from=orders@llburgers.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ???????????????????????????????????????????????????????????????????????????????
# SERVER
# ???????????????????????????????????????????????????????????????????????????????
server.port=8080
